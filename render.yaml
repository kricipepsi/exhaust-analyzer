services:
  - type: web
    name: exhaust-analyzer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PORT
        value: 5000
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
