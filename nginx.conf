# Nginx configuration for Exhaust Analyzer (reverse proxy)
# Place in /etc/nginx/sites-available/exhaust-analyzer and symlink to sites-enabled.
# Adjust server_name and paths as needed.

upstream exhaust_analyzer {
    server 127.0.0.1:5000;  # Gunicorn running locally
    # Could add more workers for load balancing if needed
}

server {
    listen 80;
    server_name _;  # change to your domain, e.g., analyzer.example.com

    # Serve static files directly (if any are placed in /var/www/exhaust-analyzer/static)
    # location /static/ {
    #     alias /var/www/exhaust-analyzer/static/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # Proxy all other requests to the Flask app
    location / {
        proxy_pass http://exhaust_analyzer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (not needed here but good practice)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Optional: Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/exhaust-analyzer.access.log;
    error_log /var/log/nginx/exhaust-analyzer.error.log;
}
