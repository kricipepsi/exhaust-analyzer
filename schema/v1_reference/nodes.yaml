nodes:
- id: rich_mixture
  name: Rich Running
  node_type: fault
  category: fuel_delivery
  prior: 0.05
  description: Air-fuel ratio is richer than stoichiometric (lambda < 0.95)
  severity: moderate
  typical_dtcs:
  - P0172
  repair: Check fuel pressure regulator, inspect injectors, verify MAF readings
  priority: 2
- id: lean_condition
  name: Lean Running
  node_type: fault
  category: air_management
  prior: 0.05
  description: Air-fuel ratio is leaner than stoichiometric (lambda > 1.05)
  severity: moderate
  typical_dtcs:
  - P0171
  repair: Check for vacuum leaks, inspect intake gaskets, verify fuel delivery pressure
  priority: 2
- id: misfire
  name: Ignition Misfire
  node_type: fault
  category: ignition
  prior: 0.03
  description: One or more cylinders failing to ignite air-fuel mixture
  severity: severe
  typical_dtcs:
  - P0300
  - P0301
  - P0302
  - P0303
  - P0304
  repair: Check spark plugs, coil packs, ignition module, HT leads
  priority: 1
- id: exhaust_leak
  name: Exhaust Leak (Pre-Catalyst)
  node_type: fault
  category: exhaust
  prior: 0.02
  description: Air entering exhaust system before catalyst, causing false lean
  severity: moderate
  typical_dtcs:
  - P0171
  repair: Inspect exhaust manifold gaskets, flex joints, pre-cat pipes
  priority: 2
- id: egr_fault
  name: EGR System Fault
  node_type: fault
  category: air_management
  prior: 0.02
  description: EGR valve stuck open or closed, or control circuit failure
  severity: moderate
  typical_dtcs:
  - P0401
  - P0404
  repair: Clean/replace EGR valve, check vacuum lines
  priority: 3
- id: catalyst_failure
  name: Catalytic Converter Inefficiency
  node_type: fault
  category: exhaust
  prior: 0.02
  description: Catalyst not converting pollutants effectively
  severity: severe
  typical_dtcs:
  - P0420
  - P0430
  repair: 'Replace catalytic converter. Common upstream causes: oil consumption (valve seals/rings/PCV), upstream rich-misfire
    history, NOx breakthrough indicating reduction-capacity loss. Check for upstream root cause before fitting new cat.'
  priority: 4
- id: sensor_fault
  name: Sensor Fault (O2/MAF/etc)
  node_type: fault
  category: sensors
  prior: 0.04
  description: Oxygen sensor, MAF, or other sensor providing inaccurate data
  severity: moderate
  typical_dtcs:
  - P0130
  - P0131
  - P0132
  - P0133
  - P0134
  - P0100
  - P0101
  - P0102
  - P0103
  repair: Replace O2 sensor, check wiring, verify with known-good analyzer
  priority: 1
- id: late_ignition_timing
  name: Late Ignition Timing
  node_type: fault
  category: ignition
  prior: 0.02
  description: Spark fires too late for charge to burn fully before exhaust valve opens. Combustible mixture (lambda 0.75-0.92)
    with extreme incomplete combustion. Timing chain/belt stretch or jumped tooth.
  severity: severe
  typical_dtcs:
  - P0016
  repair: Check timing chain/belt for stretch or jumped tooth, verify cam/crank alignment
  priority: 1
- id: mechanical_wear
  name: Worn Piston Rings / Cylinder Wear
  node_type: fault
  category: mechanical
  prior: 0.03
  description: Worn piston rings or cylinder walls causing compression loss. HC high (steady), O2 high, CO2 LOW (<12%), CO
    low, Lambda >1.0 (indicated lean), NOx LOW (low compression temp). Blue smoke under acceleration. Fuel trims positive
    (+10-20%) as ECU compensates for false lean.
  severity: severe
  typical_dtcs: []
  repair: Engine teardown, ring/bore inspection and replacement
  priority: 5
- id: valve_seal_wear
  name: Worn Valve Seals / Guides
  node_type: fault
  category: mechanical
  prior: 0.02
  description: Oil seeps past valve seals into combustion chamber during high vacuum (decel/startup). HC elevated but CO2
    NORMAL (14%+) because compression is good. Lambda near 1.0 at cruise. HC spikes on deceleration then cleans up â€” transient
    vs steady state distinguishes from rings. Blue smoke at startup or after long idle.
  severity: moderate
  typical_dtcs: []
  repair: Replace valve stem seals
  priority: 4
- id: pcv_fault
  name: PCV System Failure
  node_type: fault
  category: mechanical
  prior: 0.02
  description: 'PCV valve stuck open sucks oil mist from crankcase into combustion â€” acts like vacuum leak + oil burn. HC
    high and erratic at idle, O2 high, CO2 low, Lambda >1.0 (lean from unmetered air). Stuck closed builds crankcase pressure
    forcing oil past rings. Pinch test: squeeze PCV hose, if HC drops instantly = PCV fault confirmed.'
  severity: moderate
  typical_dtcs: []
  repair: Replace PCV valve, check hoses, pinch-test to confirm
  priority: 3
  parent: lean_condition
  discriminator:
  - pcv_leak_pattern
- id: induction_issue
  name: Induction Airflow Problem
  node_type: fault
  category: air_management
  prior: 0.02
  description: Intake restriction, cracked manifold, or throttle body fault
  severity: moderate
  typical_dtcs:
  - P0101
  - P0102
  - P0103
  repair: Inspect air filter, intake ducting, throttle body, check for restrictions
  priority: 2
  parent: lean_condition
  discriminator:
  - dtc_induction
- id: turbo_fault
  name: Turbocharger/Supercharger Fault
  node_type: fault
  category: forced_induction
  prior: 0.01
  description: 'Boost leak, wastegate stuck, or seal failure. Intake seal leak: HC high under boost, O2 high, CO2 low, Lambda
    >1.0. Exhaust seal leak: HC EXTREME but CO2 normal and Lambda ~1.0 (engine healthy, oil vaporizes after combustion). Intercooler
    check: oil in lower hose confirms compressor seal gone.'
  severity: severe
  typical_dtcs:
  - P0299
  - P0234
  - P0235
  repair: Rebuild/replace turbocharger, check intercooler for oil
  priority: 4
- id: fuel_delivery
  name: Fuel Delivery Issue
  node_type: fault
  category: fuel_delivery
  prior: 0.03
  description: Weak pump, clogged filter, or injector problem
  severity: moderate
  typical_dtcs:
  - P0201
  - P0202
  - P0203
  - P0204
  - P0087
  repair: Check fuel pump output pressure, replace fuel filter, inspect injectors
  priority: 2
  parent: lean_condition
  discriminator:
  - lambda_high
- id: ecu_fault
  name: ECU Internal Fault
  node_type: fault
  category: ecu
  prior: 0.01
  description: ECU processor, driver circuit, or reference voltage failure. Gas readings contradict OBD data.
  severity: critical
  typical_dtcs:
  - P0053
  - P0171
  - P0172
  - P0201
  - P0300
  - P0351
  - P0352
  - P0353
  - P0354
  - P0601
  - P0602
  - P0603
  - P0604
  - P0605
  - P0606
  - P0641
  - P0651
  repair: ECU shows signs of perception fault (gas vs OBD contradiction, missing misfire detection, false lean DTC) or genuine
    hardware/firmware fault. Re-flash first; replace if persistent.
  priority: 1
- id: high_fuel_pressure
  name: High Fuel Pressure (Systemic Rich)
  node_type: fault
  category: fuel_delivery
  prior: 0.02
  description: Fuel rail pressure too high causing systemic rich across all banks. CO high, O2 low, LTFT strongly negative,
    Lambda <0.95. Differentiated from leaking injector by affecting ALL cylinders uniformly.
  severity: moderate
  typical_dtcs:
  - P0172
  repair: Check fuel pressure regulator, inspect return line
  priority: 3
  parent: rich_mixture
  discriminator:
  - high_fuel_pressure_pattern
- id: leaking_injector
  name: Leaking Injector (Single Cylinder)
  node_type: fault
  category: fuel_delivery
  prior: 0.02
  description: Single injector leaking fuel into cylinder, causing localized rich with injector circuit DTC. CO high, HC high,
    negative trims, Lambda <0.95. Injector DTC differentiates from systemic high fuel pressure.
  severity: moderate
  typical_dtcs:
  - P0201
  - P0202
  - P0203
  - P0204
  repair: Replace leaking injector, isolate via cylinder disable test
  priority: 3
  parent: rich_mixture
  discriminator:
  - leaking_injector_pattern
- id: evap_purge_stuck_open
  name: EVAP Purge Valve Stuck Open
  node_type: fault
  category: fuel_delivery
  prior: 0.02
  description: EVAP purge valve stuck open, allowing fuel vapors to enter intake continuously. Affects both banks symmetrically
    â€” differentiates from leaking injector which is bank-specific. Per master_fuel_system_guide.md Â§4.
  severity: moderate
  typical_dtcs:
  - P0442
  - P0455
  repair: Replace EVAP purge valve; smoke-test EVAP system
  priority: 3
  parent: rich_mixture
  discriminator:
  - rich_negative_trims_pattern
- id: head_gasket
  name: Head Gasket Failure
  node_type: fault
  category: mechanical
  prior: 0.02
  description: Combustion/coolant breach. HC very high from coolant hydrocarbons, O2 high from combustion gas escaping, CO2
    low from dilution, CO low (not a fueling issue). Lambda >1.0. No misfire DTC â€” distinguishes from ignition misfire.
  severity: severe
  typical_dtcs: []
  repair: Replace head gasket, check head for warping, pressure test cooling system
  priority: 5
- id: head_gasket_failure_combustion_to_coolant
  name: Head Gasket â€” Combustion to Coolant Breach
  node_type: fault
  category: mechanical
  prior: 0.015
  description: Combustion gases enter cooling system. HC very high, O2 high, CO2 low, CO low. Coolant hydrocarbons test positive.
    Per master_mechanical_guide.md Â§5.
  severity: severe
  typical_dtcs: []
  repair: Replace head gasket; pressure-test cooling system; check for warped head
  priority: 5
  parent: head_gasket
  discriminator:
  - head_gasket_pattern
- id: head_gasket_failure_cyl_to_cyl
  name: Head Gasket â€” Cylinder-to-Cylinder Breach
  node_type: fault
  category: mechanical
  prior: 0.015
  description: Adjacent cylinders leak into each other. Compression loss on paired cylinders. HC elevated, CO2 low. Per master_mechanical_guide.md
    Â§5.
  severity: severe
  typical_dtcs: []
  repair: Replace head gasket; check for warped head between cylinders
  priority: 5
  parent: head_gasket
  discriminator:
  - compression_loss_pattern
- id: stuck_egr_open
  name: EGR Stuck Open (Idle)
  node_type: fault
  category: air_management
  prior: 0.02
  description: EGR valve stuck open at idle causing excessive inert gas dilution. HC high from incomplete combustion, O2 high,
    CO2 low. Refines generic egr_fault with specific idle gas pattern.
  severity: moderate
  typical_dtcs:
  - P0401
  repair: Clean/replace EGR valve, check vacuum lines
  priority: 3
- id: contaminated_maf
  name: Contaminated MAF Sensor
  node_type: fault
  category: sensors
  prior: 0.02
  description: MAF sensor contaminated with oil/dirt, underreporting airflow at high RPM. Normal at idle, lean at high RPM.
    STFT worsens with speed.
  severity: moderate
  typical_dtcs:
  - P0101
  repair: Clean MAF with dedicated cleaner or replace
  priority: 2
  parent: lean_condition
  discriminator:
  - dual_contaminated_maf_pattern
- id: clogged_exhaust
  name: Clogged Exhaust / Catalyst
  node_type: fault
  category: exhaust
  prior: 0.02
  description: Exhaust restriction (collapsed cat, crushed pipe). CO2 drops at high RPM as backpressure builds. Mildly negative
    trims at idle worsen under load.
  severity: severe
  typical_dtcs: []
  repair: Replace catalytic converter or clear exhaust restriction
  priority: 4
- id: intake_gasket_leak
  name: Intake Manifold Gasket Leak
  node_type: fault
  category: air_management
  prior: 0.02
  description: Vacuum leak at intake gasket. Very lean at idle (high vacuum), normalizes at high RPM (low vacuum). STFT >15%
    at idle, <5% at RPM.
  severity: moderate
  typical_dtcs:
  - P0171
  repair: Replace intake manifold gasket
  priority: 3
  parent: lean_condition
  discriminator:
  - dual_intake_gasket_pattern
- id: low_fuel_delivery
  name: Low Fuel Delivery (Pump/Filter)
  node_type: fault
  category: fuel_delivery
  prior: 0.02
  description: Weak fuel pump or clogged filter. Normal at idle (low demand), lean at high RPM (can't keep up). Similar to
    contaminated MAF but no MAF DTC.
  severity: moderate
  typical_dtcs:
  - P0087
  repair: Replace fuel filter, check pump output pressure
  priority: 3
  parent: lean_condition
  discriminator:
  - dual_low_fuel_delivery_pattern
- id: GDI_HPFP_Failure
  name: GDI High-Pressure Fuel Pump Failure
  node_type: fault
  category: fuel_delivery
  prior: 0.01
  description: GDI HPFP worn cam lobe or failed pump. Fuel rail pressure below desired, VCV duty cycle outside 20-35% range.
    P0087/P0089 family. Per master_fuel_system_guide.md Â§6.3.
  severity: severe
  typical_dtcs:
  - P0087
  - P0089
  repair: Replace high-pressure fuel pump; inspect cam lobe for wear
  priority: 2
  parent: fuel_delivery
  discriminator:
  - lambda_high
- id: stuck_egr_open_confirmed
  name: EGR Stuck Open (Confirmed by Dual-Speed)
  node_type: fault
  category: air_management
  prior: 0.02
  description: 'EGR stuck open confirmed: rough idle with high HC recovers at high RPM where EGR flow is proportionally smaller.'
  severity: moderate
  typical_dtcs:
  - P0401
  repair: Clean/replace EGR valve, check vacuum lines
  priority: 3
- id: Mechanical_Lean_Vacuum_Leak
  name: Intake Vacuum Leak (Mechanical Lean)
  node_type: fault
  category: air_management
  prior: 0.03
  description: Unmetered air entering downstream of the MAF/throttle. Causes lean condition at idle that improves at higher
    RPM as the leak becomes a smaller fraction of total airflow.
  severity: moderate
  typical_dtcs:
  - P0171
  repair: Smoke-test intake; inspect intake manifold gasket, vacuum hoses, brake booster, PCV valve
  priority: 2
  parent: lean_condition
  discriminator:
  - nox_high
  - idle_lean_load_corrects
  - dual_intake_gasket_pattern
- id: vacuum_leak
  name: Vacuum Leak (Unmetered Air)
  node_type: fault
  category: air_management
  prior: 0.03
  description: Unmetered air entering downstream of MAF/throttle. Lean at idle that improves at higher RPM as leak becomes
    smaller fraction of total airflow. Per master_air_induction_guide.md Â§5.
  severity: moderate
  typical_dtcs:
  - P0171
  repair: Smoke-test intake; inspect vacuum hoses, intake manifold gasket, brake booster, PCV connections
  priority: 2
  parent: lean_condition
  discriminator:
  - idle_lean_load_corrects
- id: Mechanical_Misfire_Spark_Plug
  name: Spark Plug / Coil Misfire (Mechanical)
  node_type: fault
  category: ignition
  prior: 0.03
  description: Single- or multi-cylinder physical misfire from worn plugs, failing coil, or HT lead. High HC + high O2 in
    exhaust; misfire DTC present.
  severity: severe
  typical_dtcs:
  - P0300
  - P0301
  - P0302
  - P0303
  - P0304
  - P0305
  - P0306
  repair: Replace spark plugs; coil-swap test for affected cylinder; check HT leads
  priority: 1
- id: Worn_Piston_Rings_Valve_Seals
  name: Worn Piston Rings or Valve Seals
  node_type: fault
  category: mechanical
  prior: 0.03
  description: Compression loss from worn rings or valve seals. HC stays elevated under load (blow-by), O2 elevated, NOx low
    (low compression temperature). Positive fuel trims as ECU compensates for false lean.
  severity: severe
  typical_dtcs: []
  repair: Compression test; leakdown test; if confirmed, ring/bore inspection or top-end rebuild
  priority: 5
- id: valve_timing_mechanical
  name: Valve Timing Mechanical (Wrong Valve Timing)
  node_type: fault
  category: mechanical
  prior: 0.02
  description: HC > 1000 + O2 > 5 % + CO high + CO2 low â€” classic "what enters gets out only partially burned" mechanical
    fingerprint. Timing chain/belt stretch or jumped tooth. Per master_gas_guide.md Â§8.4.
  severity: severe
  typical_dtcs:
  - P0016
  - P0017
  repair: Check timing chain/belt for stretch or jumped tooth, verify cam/crank alignment
  priority: 1
  discriminator:
  - hc_very_high
  - o2_very_high
  - co_high
- id: Cam_Timing_Retard_Late
  name: Late Cam / Ignition Timing
  node_type: fault
  category: ignition
  prior: 0.02
  description: Cam phasing or ignition timing retarded â€” fuel burns late in the cycle. High HC, low CO2, low NOx (low peak
    combustion temperature).
  severity: severe
  typical_dtcs:
  - P0016
  - P0017
  - P0011
  - P0012
  repair: Verify VVT solenoid operation; inspect timing chain stretch / jumped tooth; check ignition timing reference
  priority: 1
- id: ECU_Internal_Checksum_Error
  name: ECU Internal Checksum / EEPROM Error
  node_type: fault
  category: ecu_hardware
  prior: 0.005
  description: ECU reports internal checksum or memory error (P0601/P0606/P0610) but combustion gases are healthy. ECU must
    be re-flashed or replaced.
  severity: severe
  typical_dtcs:
  - P0601
  - P0606
  - P0610
  repair: Attempt ECU re-flash with manufacturer firmware; if checksum DTC persists, replace ECU
  priority: 1
  parent: ecu_fault
  discriminator:
  - dtc_ecu_internal
- id: ECT_Sensor_Bias
  name: ECT Sensor Bias (Stuck Cold/Hot)
  node_type: fault
  category: sensors
  prior: 0.02
  description: ECT sensor reporting wrong temperature â€” stuck cold, stuck hot, or sluggish response. Poisons the cold-start
    gate itself. Per master_cold_start_guide.md Â§6.
  severity: moderate
  typical_dtcs:
  - P0115
  - P0116
  - P0117
  - P0118
  - P0125
  - P0128
  repair: Compare ECT reading against known-good after cold-soak; replace ECT sensor if biased
  priority: 2
  discriminator:
  - ff_iat_ect_biased
- id: Lazy_O2_Sensor_Aging
  name: Lazy / Aging O2 Sensor
  node_type: fault
  category: sensors
  prior: 0.03
  description: Upstream O2 sensor switching slowly or biased â€” Brettschneider vs OBD lambda delta exceeds the bias threshold
    but combustion is otherwise OK.
  severity: moderate
  typical_dtcs:
  - P0133
  - P0153
  repair: Replace upstream O2 sensor; verify with cross-count test post-replacement (>8 counts in 10s at 2500 RPM)
  priority: 2
