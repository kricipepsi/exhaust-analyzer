- id: gases_normal
  name: All Gas Readings Within Healthy Range
  node_type: symptom
  category: compound
  weight: 0.9
- id: ecu_open_loop_blind
  name: ECU Open Loop / Frozen Trims (blind to exhaust)
  node_type: symptom
  category: compound
  description: HC/CO high but STFT=0 LTFT=0 = ECU running fixed map, not responding to exhaust chemistry
  weight: 0.9
- id: ecu_misread_lean_confirmed
  name: ECU Confirmed Lean Misread (gas rich, ECU reads lean)
  node_type: symptom
  category: compound
  description: Fires when ecu_logic_inversion confirmed (lam<0.905, STFT>15, P0171) OR ecu_open_loop_blind with lean DTC/OBD
    (obd_lambda>1.10). Gates ECU_Logic_Inversion_False_Lean leaf.
  weight: 0.92
- id: ecu_injector_driver_stuck
  name: ECU Injector Driver Hard Ground (stuck open)
  node_type: symptom
  category: compound
  description: Max negative trims (-20%+) but HC/CO still extreme = ECU lost physical control of injector
  weight: 0.95
- id: sensor_bias_lean
  name: O2 Sensor Biased Lean (reports lean when gas says rich)
  node_type: symptom
  category: compound
  description: Gas lambda <0.95 but OBD lambda >1.05 = sensor fooling ECU into adding fuel
  weight: 0.9
- id: sensor_bias_rich
  name: O2 Sensor Biased Rich (reports rich when gas says lean)
  node_type: symptom
  category: compound
  description: Gas lambda >1.05 but OBD lambda <0.95 = sensor fooling ECU into removing fuel
  weight: 0.9
- id: late_timing_pattern
  name: Late Timing Pattern (combustible mix + extreme incomplete burn)
  node_type: symptom
  category: compound
  description: Lambda 0.75-0.92 (combustible) + HC>5000 + CO>2.5 + CO2<8 + O2>3 = spark too late
  weight: 0.95
- id: compression_loss_pattern
  name: 'Compression Loss Pattern (rings: HC+O2 high, CO2 LOW, NOx low)'
  node_type: symptom
  category: compound
  description: HC high + O2 high + CO2 LOW (<12%) + CO low + NOx low + Lambda >1.0 = worn rings
  weight: 0.9
- id: valve_seal_pattern
  name: Valve Seal Pattern (HC elevated, CO2 NORMAL, good compression)
  node_type: symptom
  category: compound
  description: HC elevated (300-1000) + CO2 normal (13%+) + CO low + Lambda near 1.0 + NOx normal = oil past valve seals with
    good compression
  weight: 0.85
- id: pcv_leak_pattern
  name: PCV Leak Pattern (vacuum leak + oil burn)
  node_type: symptom
  category: compound
  description: HC high + O2 high + CO2 low + Lambda >1.05 + positive trims = unmetered air from crankcase
  weight: 0.85
- id: trim_oscillation
  name: Trim Oscillation (STFT vs LTFT opposing)
  node_type: symptom
  category: compound
  description: STFT and LTFT in opposite directions (abs>=8 each) = lazy O2 sensor causing ECU hunting
  weight: 0.85
- id: high_fuel_pressure_pattern
  name: High Fuel Pressure Pattern (systemic rich all banks)
  node_type: symptom
  category: compound
  description: CO >2% + O2 <0.5% + LTFT <-15% + Lambda <0.95 = fuel rail overpressure
  weight: 0.9
- id: leaking_injector_pattern
  name: Leaking Injector Pattern (single cylinder rich + injector DTC)
  node_type: symptom
  category: compound
  description: CO >2% + HC >200 + (LTFT<-10 or STFT<-10) + Lambda <0.95 + injector DTC = single injector leak
  weight: 0.9
- id: head_gasket_pattern
  name: Head Gasket Pattern (coolant/combustion breach)
  node_type: symptom
  category: compound
  description: HC >400 + O2 >2% + CO2 <12% + CO <1.5% + Lambda >1.0 + no misfire DTC = head gasket
  weight: 0.9
- id: stuck_egr_open_pattern
  name: Stuck EGR Open Pattern (excessive inert gas at idle)
  node_type: symptom
  category: compound
  description: HC >350 + O2 >2% + CO2 <13% + no misfire DTC = EGR stuck open at idle
  weight: 0.85
- id: egr_dilution_pattern
  name: EGR Dilution Pattern (incomplete combustion from inert gas)
  node_type: symptom
  category: compound
  description: HC >500 + CO >1.5% (combustion occurring) + Lambda ~1.0 (AFR correct) + NOx <100 (flame temp suppressed) +
    CO2 <14%. Inert gas dilutes charge, impedes flame front. High CO proves spark fires â€” differentiates from dead-cylinder
    misfire which has LOW CO.
  weight: 0.95
- id: ignition_misfire_confirmed
  name: 'Ignition Misfire Confirmed (dead cylinder: HC extreme + O2 high + CO LOW)'
  node_type: symptom
  category: compound
  description: HC >1000 + O2 >2.5% + CO <1.5% = raw fuel + air passing through unburnt dead cylinder. Low CO proves NO combustion
    â€” differentiates from EGR dilution where CO is high (combustion occurring but incomplete).
  weight: 0.9
- id: individual_cylinder_misfire_pattern
  name: Individual Cylinder Misfire (CO + O2 both high = multi-state exhaust)
  node_type: symptom
  category: compound
  description: HC >800 + CO >1.0% + O2 >2.0% = physically impossible in single combustion event. Dead cylinder pumps raw O2+HC
    while live cylinders run rich producing CO. CO+O2 contradiction proves multiple cylinder states.
  weight: 0.95
- id: tired_catalyst_pattern
  name: Tired Catalyst (engine clean, cat not finishing)
  node_type: symptom
  category: compound
  description: Lambda 0.98-1.02 + HC >80 + CO >0.3% + CO2 >12.5% + STFT near 0 = engine combustion near-perfect but tailpipe
    shows cat isn't cleaning.
  weight: 0.85
- id: high_idle_nox_pattern
  name: High Idle NOx (carbon buildup or EGR restriction)
  node_type: symptom
  category: compound
  description: NOx >150 at idle + Lambda ~1.0 + HC <100 = excessive combustion temp from carbon deposits or blocked EGR passages.
  weight: 0.85
- id: sensor_bias_false_rich
  name: Sensor Bias False Rich (Lambda<0.95 but CO near zero)
  node_type: symptom
  category: compound
  description: Lambda <0.95 + CO <0.2% + CO2 >12% = contradiction. Can't be rich with no CO. O2 sensor shifted rich, fooling
    ECU into removing fuel.
  weight: 0.9
- id: rich_negative_trims_pattern
  name: Rich + Negative Trims (systemic over-fueling)
  node_type: symptom
  category: compound
  description: CO >2% + STFT or LTFT <-15% + Lambda <=0.95 = ECU pulling fuel but can't overcome richness. Fuel pressure regulator,
    EVAP purge, or unmetered fuel source.
  weight: 0.85
- id: lean_misfire_pattern
  name: Lean Misfire Pattern (moderate HC + very lean)
  node_type: symptom
  category: compound
  description: HC 150-300 + O2 >4% + Lambda >1.1 = fuel starvation causing intermittent misfire
  weight: 0.8
- id: rich_misfire_pattern
  name: Rich Misfire Pattern (excess fuel quenches spark)
  node_type: symptom
  category: compound
  description: HC >500 + CO >1.5% + O2 >2% + Lambda <0.95 = excess fuel quenching spark. Both rich-side and lean-side products
    coexist â€” differentiates from ignition misfire which has LOW CO. Per master_ignition_guide.md Â§6.
  weight: 0.9
- id: catalyst_masking
  name: Catalyst Masking (active catalyst hiding upstream faults)
  node_type: symptom
  category: compound
  description: CO2 >14.5% + HC <30ppm = catalyst actively cleaning exhaust, may mask upstream issues
  weight: 0.7
- id: exhaust_leak_ghost
  name: Exhaust Leak Ghost (O2+CO contradiction)
  node_type: symptom
  category: compound
  description: O2 >4% + CO >1% + STFT >10% = CO and O2 both elevated is physically contradictory, indicating pre-cat air ingress
  weight: 0.9
- id: dual_contaminated_maf_pattern
  name: 'Dual-Speed: MAF Contamination (normal idle, lean at RPM)'
  node_type: symptom
  category: compound
  description: Idle STFT normal (<5%), high-RPM STFT >10% + O2 >1.5% = MAF underreporting at speed
  weight: 0.9
- id: dual_clogged_exhaust_pattern
  name: 'Dual-Speed: Clogged Exhaust (CO2 drops at RPM)'
  node_type: symptom
  category: compound
  description: Idle CO2 >13% + LTFT -5 to -12%, high-RPM CO2 <12% = backpressure builds under load
  weight: 0.9
- id: clogged_exhaust_rpm_pattern
  name: Clogged Exhaust @ RPM (single snapshot)
  node_type: symptom
  category: compound
  description: 'High-RPM snapshot only: CO2 <11 + O2 elevated + NOx >200 + lean Î» + moderate HC = restriction re-breathing'
  weight: 0.9
- id: dual_intake_gasket_pattern
  name: 'Dual-Speed: Intake Gasket Leak (lean disappears at RPM)'
  node_type: symptom
  category: compound
  description: Idle STFT >15% + O2 >2.5%, high-RPM STFT <5% + O2 <1.5% = vacuum leak seals under load
  weight: 0.9
- id: dual_low_fuel_delivery_pattern
  name: 'Dual-Speed: Low Fuel Delivery (starves at RPM)'
  node_type: symptom
  category: compound
  description: Idle STFT normal (<5%), high-RPM STFT >10% + O2 >2% = pump can't keep up at load
  weight: 0.9
- id: dual_egr_recovery_pattern
  name: 'Dual-Speed: EGR Recovery (rough idle clears at RPM)'
  node_type: symptom
  category: compound
  description: Idle stuck_egr pattern + high-RPM HC <100 + CO2 >13% = EGR stuck open confirmed by recovery
  weight: 0.9
- id: aftermarket_catalyst_inefficient
  name: Aftermarket Catalyst Inefficient (Engine Healthy)
  node_type: fault
  category: exhaust
  prior: 0.02
  description: 'Universal/replacement catalyst with lower noble-metal loading than OEM. Engine runs clean (good combustion,
    normal trims) but tailpipe HC/CO elevated. Distinguished from catalyst_failure by: (a) emission profile = aftermarket,
    (b) engine combustion is healthy.'
  severity: moderate
  typical_dtcs:
  - P0420
  repair: Replace aftermarket catalyst with OEM-spec unit; engine itself appears healthy.
  priority: 3
  parent: catalyst_failure
  discriminator:
  - tired_catalyst_pattern
- id: idle_lean_load_corrects
  name: 'L1->L2: Lambda Drops Under Load (Vacuum Leak Corrects)'
  node_type: symptom
  category: compound
  description: Lambda higher at idle than at load (dl < -0.05). Vacuum leak draws unmetered air at idle then seals under load.
  weight: 0.8
- id: idle_stoich_load_lean
  name: 'L1->L2: Lambda Rises Under Load (Fuel Delivery Can''t Keep Up)'
  node_type: symptom
  category: compound
  description: Lambda lower at idle than at load (dl > 0.05). Fuel delivery can't keep up at higher RPM â€” pump or MAF.
  weight: 0.8
- id: nox_high_idle
  name: High NOx at Idle (no high-RPM data)
  node_type: symptom
  category: compound
  weight: 0.7
- id: nox_high_load
  name: High NOx at Load (high idle gases)
  node_type: symptom
  category: compound
  weight: 0.75
- id: nox_low_with_lean
  name: Low NOx With Lean Lambda (suggests pre-cat exhaust leak)
  node_type: symptom
  category: compound
  weight: 0.85
- id: o2_upstream_lazy
  name: Upstream O2 Sensor Lazy / Stuck
  node_type: symptom
  category: obd_pid
  weight: 0.8
- id: o2_downstream_active
  name: Downstream O2 Active With P0420 (catalyst not damping)
  node_type: symptom
  category: obd_pid
  weight: 0.8
- id: o2_downstream_steady
  name: Downstream O2 Steady High (healthy or rich-stuck)
  node_type: symptom
  category: obd_pid
  weight: 0.5
- id: bank2_lean
  name: Bank 2 Lean
  node_type: symptom
  category: obd_pid
  weight: 0.75
- id: bank2_rich
  name: Bank 2 Rich
  node_type: symptom
  category: obd_pid
  weight: 0.75
- id: trim_global_both_banks
  name: Trim Imbalance Global (both banks same direction)
  node_type: symptom
  category: obd_pid
  weight: 0.7
- id: trim_local_one_bank
  name: Trim Imbalance Local (one bank diverges)
  node_type: symptom
  category: obd_pid
  weight: 0.8
- id: ff_open_loop_at_fault
  name: 'FF: Fuel System Open Loop at Fault Capture'
  node_type: symptom
  category: freeze_frame
  weight: 0.8
- id: ff_load_high_at_low_rpm
  name: 'FF: Calculated Load High at Low RPM'
  node_type: symptom
  category: freeze_frame
  weight: 0.7
- id: ff_ect_warmup
  name: 'FF: ECT Below Operating Temperature'
  node_type: symptom
  category: freeze_frame
  weight: 0.7
- id: ff_iat_ect_biased
  name: 'FF: IAT/ECT Disagreement at Cold Soak'
  node_type: symptom
  category: freeze_frame
  weight: 0.7
- id: ff_timing_retard_severe
  name: 'FF: Severe Ignition Timing Retard'
  node_type: symptom
  category: freeze_frame
  weight: 0.85
- id: ff_codes_cleared_invalidated
  name: 'FF: DTC Memory Recently Cleared (trims un-learned)'
  node_type: symptom
  category: freeze_frame
  weight: 0.95
- id: Exhaust_Air_Leak_Pre_Cat
  name: Pre-Catalyst Exhaust Air Leak
  node_type: fault
  category: exhaust
  prior: 0.01
  description: Air entering exhaust system upstream of the catalyst. Tailpipe shows elevated O2 with non-trivial CO; ECU adds
    fuel (positive trims) chasing a false-lean upstream O2 sensor reading.
  severity: moderate
  typical_dtcs:
  - P0171
  repair: Smoke-test exhaust upstream of cat; inspect manifold gaskets, flex joint, pre-cat pipe seams
  priority: 2
  parent: exhaust_leak
  discriminator:
  - exhaust_leak_ghost
- id: Low_Compression_Multi_Cylinder
  name: Low Compression (Multi-Cylinder)
  node_type: fault
  category: mechanical
  prior: 0.005
  description: Compression loss across multiple cylinders from worn rings or valves. HC high from incomplete burn, O2 high
    from weak combustion, CO2 LOW (<12%) from poor volumetric efficiency, NOx low (low peak compression temperature). Positive
    fuel trims as ECU compensates for false lean.
  severity: severe
  typical_dtcs: []
  repair: Compression test all cylinders; if multiple cylinders <100 psi, leakdown test to isolate rings vs valves
  priority: 5
- id: ns_ckp_failure
  name: CKP Sensor Failure (No RPM Signal During Cranking)
  node_type: fault
  category: sensors
  prior: 0.02
  description: Crankshaft position sensor failure â€” no RPM signal during cranking. ECU cannot fire injectors or coils. No
    fuel AND no spark simultaneously. Per master_non_starter_guide.md Â§5 and master_ignition_guide.md Â§7.
  severity: severe
  typical_dtcs:
  - P0335
  repair: Replace CKP sensor; check wiring and air gap
  priority: 1
- id: ctx_cold_engine
  name: Cold Engine Context
  node_type: symptom
  category: context
  weight: 0.7
  description: Engine is cold (not at operating temperature). Suppresses O2-sensor-dependent diagnoses (ECU runs fixed map).
- id: perception_lean_seen_rich
  name: 'Perception: ECU Lean But Gas Rich (Truth-vs-Perception)'
  node_type: symptom
  category: compound
  description: Gas chemistry says rich (lambda<0.905, CO>1.5) but ECU reports lean (P0171, obd_lambda>1.05). Suspect O2 sensor
    bias or ECU adaptive memory corruption. Per master_perception_guide.md Â§3.1.
  weight: 0.85
- id: perception_rich_seen_lean
  name: 'Perception: ECU Rich But Gas Lean (Truth-vs-Perception)'
  node_type: symptom
  category: compound
  description: Gas chemistry says lean (lambda>1.095, O2>2.0) but ECU reports rich (P0172, obd_lambda<0.95). Suspect O2 sensor
    bias or ECU adaptive memory corruption. Per master_perception_guide.md Â§3.2.
  weight: 0.85
- id: trim_sum_positive_high
  name: Total Fuel Trim High Positive (STFT+LTFT > 10%)
  node_type: symptom
  category: obd_pid
  weight: 0.85
  description: Industry-standard total-trim heuristic. STFT+LTFT > 10% on bank 1 (or bank 2). Stronger lean-condition signal
    than either component alone.
- id: trim_sum_negative_high
  name: Total Fuel Trim High Negative (STFT+LTFT < -10%)
  node_type: symptom
  category: obd_pid
  weight: 0.85
  description: Industry-standard total-trim heuristic. STFT+LTFT < -10% on bank 1 (or bank 2). Stronger rich-condition signal
    than either component alone.
- id: vvt_phaser_fault
  name: VVT Phaser Mechanical Fault (Lag/Advance)
  node_type: fault
  category: mechanical
  prior: 0.005
  description: VVT phaser stuck or sluggish — cam timing drifts from commanded position. Incomplete burn produces elevated
    HC at idle with normal lambda.
  severity: moderate
  typical_dtcs:
  - P0011
  - P0012
  - P0014
  repair: Inspect VVT solenoid resistance, check oil passages for sludge, verify phaser movement with bidirectional scan tool
  priority: 3
  parent: valve_timing_mechanical
  discriminator:
  - vvt_lag
  - cooled_rich_burn
  - cam_timing_noise
- id: gdi_lspi
  name: GDI Low-Speed Pre-Ignition (LSPI)
  node_type: fault
  category: mechanical
  prior: 0.003
  description: Low-speed pre-ignition in GDI turbo engines — fuel droplets ignite before spark under high load/low RPM. Knock
    sensor triggers severe timing retard in freeze-frame.
  severity: severe
  typical_dtcs: []
  repair: Check for oil dilution raising crankcase vapour, inspect injector spray pattern, use LSPI-resistant oil specification
  priority: 3
  discriminator:
  - lspi
- id: gdi_carbon_buildup
  name: GDI Intake Valve Carbon Buildup
  node_type: fault
  category: fuel_delivery
  prior: 0.004
  description: Carbon deposits on GDI intake valves disrupt airflow and fuel atomization. HC elevated especially cold start.
    No fuel washing of valves (GDI injects directly into cylinder).
  severity: moderate
  typical_dtcs: []
  repair: Walnut-blast intake valves, consider catch-can installation, verify PCV function
  priority: 3
  discriminator:
  - gdi_carbon
- id: gdi_hpfp_internal_leak
  name: GDI HPFP Internal Seal Leak (Fuel in Oil)
  node_type: fault
  category: fuel_delivery
  prior: 0.004
  description: GDI high-pressure fuel pump internal seal leaks fuel into engine oil. PCV recycles fuel vapour causing rich
    mixture. Oil level rises with fuel dilution.
  severity: severe
  typical_dtcs:
  - P0172
  repair: Replace HPFP assembly, change oil and filter, verify no bore scoring from fuel-washed oil
  priority: 3
  parent: high_fuel_pressure
  discriminator:
  - dilution
  - hpfp_seal
- id: ecu_open_loop_fault
  name: ECU Stuck in Open Loop (Corrupted Adaptive)
  node_type: fault
  category: ecu
  prior: 0.004
  description: ECU adaptive fuel strategy corrupted forcing permanent open-loop with stale fuel map values. Trims frozen at
    0% despite rich or lean gas evidence.
  severity: severe
  typical_dtcs: []
  repair: Reflash ECU with latest calibration, reset adaptive learned values, verify fuel system status PID
  priority: 2
  parent: ecu_fault
  discriminator:
  - open_loop
- id: ecu_logic_inversion_fault
  name: ECU Logic Inversion (False Lean/Rich)
  node_type: fault
  category: ecu
  prior: 0.005
  description: ECU misinterprets O2 sensor signal — sees lean when rich (or vice versa). Gas chemistry contradicts ECU perception.
    Positive trims despite rich exhaust; lean DTC on rich engine.
  severity: severe
  typical_dtcs:
  - P0171
  repair: Check O2 sensor signal integrity, inspect for silicone contamination on sensor, verify ECU ground reference
  priority: 2
  parent: ecu_fault
  discriminator:
  - ecu_liar
- id: egr_stuck_open_idle
  name: EGR Stuck Open at Idle
  node_type: fault
  category: air_management
  prior: 0.005
  description: EGR valve mechanically stuck open at idle — exhaust gas dilutes intake charge causing very high HC, rough idle,
    possible stalling. Clears at higher RPM.
  severity: severe
  typical_dtcs:
  - P0401
  repair: Remove and clean EGR valve, verify pintle seats fully, check for carbon debris holding valve open
  priority: 2
  parent: stuck_egr_open
  discriminator:
  - dilution
  - stoich
  - high_hc
- id: sai_valve_stuck_open
  name: Secondary Air Injection Valve Stuck Open
  node_type: fault
  category: air_management
  prior: 0.004
  description: SAI valve fails open pumping fresh air into exhaust stream. O2 reads very high, CO and HC diluted, ECU may
    falsely interpret as lean.
  severity: moderate
  typical_dtcs:
  - P0410
  - P0411
  repair: Check SAI solenoid and check valve, verify pump only runs during cold start, inspect for stuck-open reed valve
  priority: 2
  discriminator:
  - sai_open
  parent: exhaust_leak
- id: misfire_single_cylinder
  name: Single-Cylinder Misfire (P0301-P0304)
  node_type: fault
  category: ignition
  prior: 0.005
  description: Misfire isolated to a single cylinder — plug, coil, or injector fault. ECU identifies specific cylinder via
    crank acceleration.
  severity: moderate
  typical_dtcs:
  - P0301
  - P0302
  - P0303
  - P0304
  repair: Swap coil/plug to isolate, compression test suspect cylinder, inspect injector
  priority: 2
  parent: misfire
  discriminator:
  - p030x
- id: nox_low
  name: Low Nitrogen Oxides
  node_type: symptom
  category: chemical
  description: NOx below threshold — indicates low peak combustion temperature (rich mixture, EGR dilution, late timing, or
    low compression)
