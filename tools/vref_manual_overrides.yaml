# V2 vref.db manual overrides — top petrol engine codes
# Source: master guides + domain-expert flags for tech masking (v2-era-masking §3)
# Each entry maps one engine code to its V2 engine_ref row.
#
# era_bucket is derived from my_start/my_end:
#   1990-1995 → ERA_PRE_OBDII
#   1996-2005 → ERA_OBDII_EARLY
#   2006-2015 → ERA_CAN
#   2016-2020 → ERA_MODERN
#
# target_rpm_u2: high-idle test RPM per manufacturer spec (default 2500)
# target_lambda_v112: expected lambda at target RPM (default 1.000)
# o2_type: "WB" = wideband, "NB" = narrowband

